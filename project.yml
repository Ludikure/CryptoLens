name: MarketScope
settings:
  base:
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_EMIT_LOC_STRINGS_RESOURCES: YES
    DEVELOPMENT_TEAM: 6AS729C9FR
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "13"
options:
  bundleIdPrefix: com.ludikure
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  MarketScope:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - CryptoLens
    info:
      path: CryptoLens/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: MarketScope
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: SystemBackground
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: false
        # API keys removed from bundle — all calls go through worker proxy
        BGTaskSchedulerPermittedIdentifiers:
          - com.ludikure.CryptoLens.priceCheck
        UIBackgroundModes:
          - fetch
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ludikure.CryptoLens
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6AS729C9FR
    entitlements:
      path: MarketScope.entitlements
      properties:
        aps-environment: development
    dependencies:
      - target: MarketScopeWidget
    scheme:
      run:
        environmentVariables:
          - variable: IDEPreferLogStreaming
            value: "YES"
            isEnabled: true

  MarketScopeWidget:
    type: app-extension
    platform: iOS
    sources:
      - MarketScopeWidget
    info:
      path: MarketScopeWidget/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: MarketScope Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ludikure.CryptoLens.widget
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: MarketScopeWidget/MarketScopeWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ludikure.CryptoLens
