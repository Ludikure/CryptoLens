name: MarketScope
settings:
  base:
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
options:
  bundleIdPrefix: com.ludikure
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  MarketScope:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - CryptoLens
    info:
      path: CryptoLens/Info.plist
      properties:
        CFBundleVersion: "4"
        CFBundleDisplayName: MarketScope
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: false
        ClaudeAPIKey: $(CLAUDE_API_KEY)
        GeminiAPIKey: $(GEMINI_API_KEY)
        TwelveDataAPIKey: $(TWELVE_DATA_API_KEY)
        BGTaskSchedulerPermittedIdentifiers:
          - com.ludikure.CryptoLens.priceCheck
        UIBackgroundModes:
          - fetch
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_EMIT_LOC_STRINGS: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ludikure.CryptoLens
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: MarketScope.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.ludikure.CryptoLens
    dependencies:
      - target: MarketScopeWidget
    scheme:
      run:
        environmentVariables:
          - variable: IDEPreferLogStreaming
            value: "YES"
            isEnabled: true

  MarketScopeWidget:
    type: app-extension
    platform: iOS
    sources:
      - MarketScopeWidget
    info:
      path: MarketScopeWidget/Info.plist
      properties:
        CFBundleVersion: "4"
        CFBundleDisplayName: MarketScope Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        PRODUCT_BUNDLE_IDENTIFIER: com.ludikure.CryptoLens.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: MarketScopeWidget/MarketScopeWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ludikure.CryptoLens
