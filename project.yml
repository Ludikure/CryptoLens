name: MarketScope
options:
  bundleIdPrefix: com.ludikure
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  MarketScope:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - CryptoLens
    info:
      path: CryptoLens/Info.plist
      properties:
        CFBundleDisplayName: MarketScope
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: false
        ClaudeAPIKey: $(CLAUDE_API_KEY)
        GeminiAPIKey: $(GEMINI_API_KEY)
        BGTaskSchedulerPermittedIdentifiers:
          - com.ludikure.CryptoLens.priceCheck
        UIBackgroundModes:
          - fetch
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_EMIT_LOC_STRINGS: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ludikure.CryptoLens
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      run:
        environmentVariables:
          - variable: IDEPreferLogStreaming
            value: "YES"
            isEnabled: true
